name: publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          expected_tag="v$(node -p 'require("./package.json").version')"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${expected_tag}" >&2
            exit 1
          fi

      - name: Run tests
        run: pnpm test

      - name: Build package
        run: pnpm build

      - name: Verify build contract
        run: pnpm build:verify

      - name: Verify pack contract
        run: pnpm pack:verify

      - name: Smoke test packed CLI
        run: pnpm pack:smoke

      - name: Publish to npm
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance
