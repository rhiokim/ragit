name: docs-gh-pages

on:
  push:
    branches:
      - main
    paths:
      - "apps/docs/**"
      - ".github/workflows/docs-gh-pages.yml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docs-gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: i18n completeness check (warn-only)
        run: pnpm docs:check:i18n

      - name: Build docs
        run: pnpm docs:build

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf .gh-pages-dist
          mkdir -p .gh-pages-dist
          cp -R apps/docs/out/. .gh-pages-dist/
          touch .gh-pages-dist/.nojekyll

          cd .gh-pages-dist
          git init --initial-branch=gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --allow-empty -m "docs: deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
