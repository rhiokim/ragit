<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="28" fill="#0F172A"/>
  <rect x="28" y="28" width="1144" height="704" rx="24" fill="#F8FAFC"/>
  <text x="72" y="104" fill="#0F172A" font-family="system-ui, sans-serif" font-size="38" font-weight="700">Memory as three layers, not one transcript</text>
  <text x="72" y="144" fill="#475569" font-family="system-ui, sans-serif" font-size="20">RAGit separates temporary notes, active continuity, and reusable project knowledge.</text>

  <rect x="120" y="194" width="960" height="124" rx="24" fill="#E2E8F0"/>
  <text x="160" y="238" fill="#334155" font-family="system-ui, sans-serif" font-size="20" font-weight="700">Short-term memory</text>
  <text x="160" y="272" fill="#475569" font-family="system-ui, sans-serif" font-size="17">Scratch space for rough notes, temporary observations, and in-session experiments.</text>
  <text x="160" y="298" fill="#64748B" font-family="system-ui, sans-serif" font-size="15">Conceptual in the MVP, but not a first-class searchable layer.</text>
  <rect x="882" y="224" width="150" height="58" rx="16" fill="#CBD5E1"/>
  <text x="915" y="260" fill="#334155" font-family="system-ui, sans-serif" font-size="18" font-weight="700">transient</text>

  <rect x="96" y="346" width="1008" height="150" rx="28" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/>
  <text x="140" y="394" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="24" font-weight="700">Working memory</text>
  <text x="140" y="430" fill="#0F172A" font-family="system-ui, sans-serif" font-size="18">The active state you want to resume tomorrow: goal, constraints, open loops, next actions.</text>
  <text x="140" y="460" fill="#334155" font-family="system-ui, sans-serif" font-size="16">This is the continuity layer. It restores momentum instead of replaying every raw note.</text>
  <rect x="860" y="382" width="198" height="72" rx="18" fill="#FFFFFF"/>
  <text x="888" y="418" fill="#1D4ED8" font-family="system-ui, sans-serif" font-size="18" font-weight="700">MVP priority</text>
  <text x="888" y="442" fill="#475569" font-family="system-ui, sans-serif" font-size="14">resume active work</text>

  <rect x="120" y="528" width="960" height="132" rx="24" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/>
  <text x="160" y="576" fill="#166534" font-family="system-ui, sans-serif" font-size="24" font-weight="700">Long-term memory</text>
  <text x="160" y="612" fill="#0F172A" font-family="system-ui, sans-serif" font-size="18">Reusable project knowledge: stable decisions, glossary entries, durable plans, promoted rules.</text>
  <text x="160" y="640" fill="#334155" font-family="system-ui, sans-serif" font-size="16">This is the retrieval layer. It restores durable knowledge for future sessions.</text>
  <rect x="860" y="562" width="198" height="72" rx="18" fill="#FFFFFF"/>
  <text x="888" y="598" fill="#166534" font-family="system-ui, sans-serif" font-size="18" font-weight="700">MVP priority</text>
  <text x="888" y="622" fill="#475569" font-family="system-ui, sans-serif" font-size="14">find it again later</text>

  <path d="M600 318V346" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>
  <path d="M600 496V528" stroke="#94A3B8" stroke-width="5" stroke-linecap="round"/>

  <rect x="72" y="676" width="362" height="24" rx="12" fill="#CBD5E1"/>
  <rect x="72" y="676" width="700" height="24" rx="12" fill="#2563EB"/>
  <rect x="772" y="676" width="356" height="24" rx="12" fill="#16A34A"/>
  <text x="72" y="668" fill="#475569" font-family="system-ui, sans-serif" font-size="14">RAGit MVP emphasis shifts from scratch space to continuity and reusable knowledge.</text>
</svg>
